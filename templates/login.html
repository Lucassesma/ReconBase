<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ReconBase — Iniciar sesion</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23080C14'/><text x='3' y='23' font-family='Arial Black,sans-serif' font-weight='900' font-size='18' fill='%23E2EDF8'>R</text><text x='16' y='23' font-family='Arial Black,sans-serif' font-weight='900' font-size='18' fill='%233B82F6'>B</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080C14;--surface:#0D1220;--border:#1E2D4A;--text:#E2EDF8;--muted:#64748B;--dim:#475569;--blue:#2563EB;--blue-dk:#1D4ED8;--blue-lt:#3B82F6;--green:#10B981;--red:#EF4444}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 6%;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-weight:800;font-size:1.1rem;letter-spacing:-.03em}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem;width:100%;max-width:400px}
.card-title{font-size:1.5rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.4rem}
.card-sub{font-size:.85rem;color:var(--muted);margin-bottom:2rem}
.field{margin-bottom:1.25rem}
.field label{display:block;font-size:.75rem;font-family:'JetBrains Mono',monospace;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
.field input{width:100%;background:#080C14;border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.88rem;padding:.7rem .9rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--blue-lt);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.field input::placeholder{color:var(--dim)}
.btn-submit{width:100%;background:var(--blue-dk);color:#fff;border:none;padding:.85rem;border-radius:7px;font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;cursor:pointer;transition:background .2s;margin-top:.5rem}
.btn-submit:hover{background:#1e40af}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;font-size:.78rem;color:var(--dim)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.footer-link{text-align:center;margin-top:1.5rem;font-size:.83rem;color:var(--muted)}
.footer-link a{color:var(--blue-lt);font-weight:600}
.footer-link a:hover{text-decoration:underline}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:.65rem .85rem;font-size:.8rem;color:#F87171;margin-bottom:1rem;display:none}
.error-msg.show{display:block}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none" height="24">
      <text x="0" y="29" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" letter-spacing="-0.5" fill="#E2EDF8">RECON</text>
      <text x="86" y="29" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" letter-spacing="-0.5" fill="#3B82F6">BASE</text>
    </svg>
  </a>
</nav>
<div class="main">
  <div class="card">
    <div class="card-title">Bienvenido de nuevo</div>
    <div class="card-sub">Inicia sesion para acceder a tu dashboard</div>
    <div class="error-msg" id="error-msg">Email o contrasena incorrectos</div>
    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@tuempresa.com" required>
      </div>
      <div class="field">
        <label>Contrasena</label>
        <input type="password" id="password" placeholder="..." required>
      </div>
      <button type="submit" class="btn-submit">Iniciar sesion</button>
    </form>
    <div class="footer-link">No tienes cuenta? <a href="/register">Registrate gratis</a></div>
    <div class="footer-link" style="margin-top:.75rem"><a href="/" style="color:var(--dim)">Volver a la web</a></div>
  </div>
</div>
<script>
function handleLogin(e) {
  e.preventDefault();
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;
  fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: email, password: password})
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if(data.ok) {
      window.location.href = '/app';
    } else {
      var el = document.getElementById('error-msg');
      el.textContent = data.error || 'Email o contrasena incorrectos';
      el.classList.add('show');
    }
  })
  .catch(function(){ alert('Error de conexion'); });
}
</script>
</body>
</html>
