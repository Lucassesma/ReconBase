*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060D09;--surface:#0A1410;--border:#152B1E;--text:#E2EDF8;--muted:#64748B;--red:#EF4444;--green:#22C55E}

.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-ghost:hover{border-color:var(--green);color:var(--text)}
