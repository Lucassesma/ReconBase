<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pago completado — ReconBase</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23080C14'/><text x='3' y='23' font-family='Arial Black,sans-serif' font-weight='900' font-size='18' fill='%23E2EDF8'>R</text><text x='16' y='23' font-family='Arial Black,sans-serif' font-weight='900' font-size='18' fill='%2322C55E'>B</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060D09;--surface:#0A1410;--border:#152B1E;--text:#E2EDF8;--muted:#64748B;--green:#22C55E;--green-dk:#15803D}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;align-items:center;padding:1.1rem 6%;border-bottom:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:3rem 2.5rem;max-width:480px;width:100%}
.check{width:64px;height:64px;border-radius:50%;background:rgba(34,197,94,.15);border:2px solid #166534;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.75rem;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.title{font-size:1.5rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.5rem;color:var(--green)}
.sub{font-size:.9rem;color:var(--muted);line-height:1.7;margin-bottom:2rem}
.features{text-align:left;margin-bottom:2rem}
.feature{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;font-size:.85rem;color:var(--text)}
.feature span{color:var(--green);font-weight:700}
.actions{display:flex;flex-direction:column;gap:.75rem}
.btn{padding:.8rem 1.5rem;border-radius:8px;font-family:'Inter',sans-serif;font-weight:700;font-size:.9rem;text-decoration:none;text-align:center;transition:all .2s}
.btn-primary{background:var(--green-dk);color:#fff}.btn-primary:hover{background:#166534}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-ghost:hover{border-color:var(--green);color:var(--text)}
</style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
<nav>
  <a href="/" style="text-decoration:none">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none" height="24">
      <text x="0" y="29" font-family="Arial Black,sans-serif" font-weight="900" font-size="22" letter-spacing="-0.5" fill="#E2EDF8">RECON</text>
      <text x="86" y="29" font-family="Arial Black,sans-serif" font-weight="900" font-size="22" letter-spacing="-0.5" fill="#22C55E">BASE</text>
    </svg>
  </a>
</nav>
<div class="main">
  <div class="card">
    <div class="check">✓</div>
    <div class="title">Pago completado</div>
    <div class="sub">Tu plan Pro está activo. Puede tardar unos segundos en reflejarse. Recibirás un email de confirmación.</div>
    <div class="features">
      <div class="feature"><span>✓</span> Escaneos ilimitados</div>
      <div class="feature"><span>✓</span> Vigilancia nocturna automática</div>
      <div class="feature"><span>✓</span> Alertas por email</div>
      <div class="feature"><span>✓</span> Filtraciones Deep Web</div>
      <div class="feature"><span>✓</span> Informes PDF ejecutivos</div>
    </div>
    <div class="actions">
      <a href="/" class="btn btn-primary" onclick="if(typeof navSwitch==='function')navSwitch('escaner')">Empezar a escanear →</a>
      <a href="/perfil" class="btn btn-ghost">Ver mi perfil</a>
    </div>
  </div>
</div>
</body>
</html>
