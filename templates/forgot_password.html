<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recuperar contraseña — ReconBase</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23080C14'/><text x='3' y='23' font-family='Arial Black,sans-serif' font-weight='900' font-size='18' fill='%23E2EDF8'>R</text><text x='16' y='23' font-family='Arial Black,sans-serif' font-weight='900' font-size='18' fill='%2322C55E'>B</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060D09;--surface:#0A1410;--border:#152B1E;--text:#E2EDF8;--muted:#64748B;--green:#22C55E;--green-dk:#15803D}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
nav{position:fixed;top:0;left:0;right:0;padding:1.1rem 6%;border-bottom:1px solid var(--border);background:var(--bg)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem;width:100%;max-width:400px}
.title{font-size:1.3rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.4rem}
.sub{font-size:.85rem;color:var(--muted);line-height:1.6;margin-bottom:1.75rem}
.form-group{margin-bottom:1rem}
.form-label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:.4rem}
.form-input{width:100%;background:#080C14;border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:.88rem;padding:.7rem .9rem;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--green)}
.btn{width:100%;background:var(--green-dk);color:#fff;border:none;padding:.8rem;border-radius:7px;font-family:'Inter',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn:hover{background:#166534}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{padding:.7rem 1rem;border-radius:7px;font-size:.83rem;margin-top:1rem;display:none}
.msg-ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ADE80}
.msg-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#F87171}
.link{color:var(--green);font-size:.82rem}
</style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
<nav>
  <a href="/" style="text-decoration:none">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none" height="24">
      <text x="0" y="29" font-family="Arial Black,sans-serif" font-weight="900" font-size="22" letter-spacing="-0.5" fill="#E2EDF8">RECON</text>
      <text x="86" y="29" font-family="Arial Black,sans-serif" font-weight="900" font-size="22" letter-spacing="-0.5" fill="#22C55E">BASE</text>
    </svg>
  </a>
</nav>
<div class="card">
  <div class="title">Recuperar contraseña</div>
  <div class="sub">Introduce tu email y te enviaremos un enlace para restablecer la contraseña.</div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-input" type="email" id="email" placeholder="tu@empresa.com" onkeydown="if(event.key==='Enter')enviar()">
  </div>
  <button class="btn" id="btn" onclick="enviar()">Enviar enlace de recuperación</button>
  <div class="msg msg-ok" id="msg-ok">Si el email existe, recibirás un enlace en los próximos minutos. Revisa también la carpeta de spam.</div>
  <div class="msg msg-err" id="msg-err"></div>
  <div style="text-align:center;margin-top:1.25rem">
    <a href="/login" class="link">← Volver al login</a>
  </div>
</div>
<script>
async function enviar() {
  var btn = document.getElementById('btn');
  var email = document.getElementById('email').value.trim();
  document.getElementById('msg-ok').style.display = 'none';
  document.getElementById('msg-err').style.display = 'none';
  if (!email) { var e = document.getElementById('msg-err'); e.textContent = 'Introduce tu email'; e.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    var r = await fetch('/api/forgot-password', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email:email})});
    var d = await r.json();
    if (d.ok) { document.getElementById('msg-ok').style.display = 'block'; }
    else { var e = document.getElementById('msg-err'); e.textContent = d.error; e.style.display = 'block'; }
  } catch(err) { var e = document.getElementById('msg-err'); e.textContent = 'Error de conexión'; e.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Enviar enlace de recuperación';
}
</script>
</body>
</html>
